
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayer Retatrutide 试药申请 · 内部审核系统</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&amp;family=SF+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bayer-dark: #10384F;
    --bayer-blue: #00BCFF;
    --bayer-green: #89D329;
    --bg: #F8FAFC;
    --card: #FFFFFF;
    --text: #1F2A37;
    --muted: #5A6B7F;
    --border: #E0E7EF;
    --pending: #FF9500;
    --approved: #89D329;
    --rejected: #FF3B30;
    --reviewing: #00BCFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
    background: var(--bayer-dark);
    color: #fff;
    display: flex; flex-direction: column;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 36px 24px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  .logo-bayer {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--bayer-blue);
    letter-spacing: 2.5px;
    margin-top: 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    font-size: 15.5px;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    transition: all 0.25s;
  }

  .nav-item:hover { background: rgba(0,188,255,0.12); }
  .nav-item.active { background: var(--bayer-blue); color: var(--bayer-dark); font-weight: 600; }

  .nav-badge {
    margin-left: auto;
    background: var(--pending);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 9999px;
  }

  /* Main */
  .main { margin-left: 220px; min-height: 100vh; }

  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    height: 72px;
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-title {
    font-size: 21px; font-weight: 600; color: var(--bayer-dark);
  }

  .topbar-search {
    background: #F1F5F9;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 16px;
    width: 340px;
    display: flex; align-items: center; gap: 10px;
  }

  .topbar-search input {
    border: none; background: none; outline: none; width: 100%; font-size: 15px;
  }

  .content { padding: 40px 40px; }

  /* Stats & Filter */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px; margin-bottom: 40px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .stat-label { font-size: 13px; color: var(--muted); }
  .stat-value { font-size: 42px; font-weight: 700; color: var(--bayer-dark); font-family: "SF Mono", monospace; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title { font-size: 20px; font-weight: 600; color: var(--bayer-dark); }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .filter-btn {
    padding: 8px 20px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
  }

  .filter-btn.active {
    background: var(--bayer-dark);
    color: #fff;
  }

  /* Table */
  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow-x: auto;
  }

  table { width: 100%; min-width: 1100px; border-collapse: collapse; }

  th {
    padding: 16px 24px;
    text-align: left;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    background: #F8FAFC;
  }

  td {
    padding: 18px 24px;
    font-size: 15px;
    border-top: 1px solid var(--border);
  }

  tr:hover { background: rgba(0,188,255,0.05); }

  .applicant-cell { display: flex; align-items: center; gap: 14px; }

  .applicant-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; color: #fff;
  }

  .status-badge {
    padding: 6px 18px;
    border-radius: 9999px;
    font-size: 13.5px;
    font-weight: 600;
  }

  .action-btn {
    padding: 8px 20px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
  }

  .action-btn.approve { background: var(--bayer-green); color: #fff; }
  .action-btn.reject { background: #FFEBEE; color: var(--rejected); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(16,56,79,0.75);
    backdrop-filter: blur(16px);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 20px;
    width: 680px;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(16,56,79,0.25);
  }

  .modal-header {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  .modal-title { font-size: 21px; font-weight: 600; color: var(--bayer-dark); }

  .modal-body { padding: 32px; }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 24px; margin-bottom: 32px;
  }

  .detail-label {
    font-size: 12.5px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px;
  }

  .detail-value { font-size: 16px; font-weight: 500; }

  .detail-box {
    background: #F8FAFC;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    font-size: 15px; line-height: 1.6;
  }

  .modal-footer {
    padding: 24px 32px;
    border-top: 1px solid var(--border);
    display: flex; gap: 12px; justify-content: flex-end;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; right: 32px;
    background: var(--bayer-dark); color: #fff;
    padding: 14px 24px; border-radius: 9999px;
    font-size: 15px; font-weight: 500;
    display: none; align-items: center; gap: 10px;
    z-index: 999;
  }

  .toast.show { display: flex; }
  .toast.success { background: var(--bayer-green); }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-bayer">BAYER</div>
    <div class="logo-sub">PHARMACEUTICALS</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="switchTab('review')">
      <span style="font-size:22px">📋</span> 申请审核
      <span class="nav-badge" id="pendingBadge">3</span>
    </div>
    <div class="nav-item" onclick="switchTab('new')">
      <span style="font-size:22px">➕</span> 新建申请
    </div>
  </nav>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Retatrutide 试药申请 · 内部审核系统</div>
    <div class="topbar-search">
      <span>🔍</span>
      <input type="text" placeholder="搜索申请人、病例编号…" oninput="filterTable(this.value)">
    </div>
  </div>

  <div class="content">

    <!-- Tabs -->
    <div class="tab-row">
      <div class="tab active" id="tab-review" onclick="switchTab('review')">申请列表</div>
      <div class="tab" id="tab-new" onclick="switchTab('new')">新建申请</div>
    </div>

    <!-- Review Tab -->
    <div class="tab-content active" id="content-review">

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">申请总数</div>
          <div class="stat-value" id="totalCount">8</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待审核</div>
          <div class="stat-value" id="pendingCount">3</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已批准</div>
          <div class="stat-value" id="approvedCount">4</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已拒绝</div>
          <div class="stat-value" id="rejectedCount">1</div>
        </div>
      </div>

      <!-- Filter -->
      <div class="section-header">
        <div>
          <div class="section-title">申请列表</div>
          <div style="font-size:14px;color:var(--muted);">Retatrutide（瑞他鲁肽）个人试药申请</div>
        </div>
        <div class="filter-row">
          <div class="filter-btn active" onclick="applyFilter('all', this)">全部</div>
          <div class="filter-btn" onclick="applyFilter('pending', this)">待审核</div>
          <div class="filter-btn" onclick="applyFilter('reviewing', this)">审核中</div>
          <div class="filter-btn" onclick="applyFilter('approved', this)">已批准</div>
          <div class="filter-btn" onclick="applyFilter('rejected', this)">已拒绝</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>申请人</th>
              <th>年龄</th>
              <th>BMI</th>
              <th>特殊病例名称</th>
              <th>来源机构</th>
              <th>申请日期</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- New Application Tab -->
    <div class="tab-content" id="content-new">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:720px;margin:0 auto;">
        <div style="font-size:22px;font-weight:600;margin-bottom:28px;color:var(--bayer-dark);">新建试药申请</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">* 申请人姓名</label>
            <input id="newName" type="text" placeholder="请输入真实姓名" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
          </div>
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">* 年龄</label>
            <input id="newAge" type="number" placeholder="18–75" min="18" max="75" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
          </div>
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">* BMI（kg/m²）</label>
            <input id="newBmi" type="number" placeholder="≥24.0" step="0.1" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
          </div>
          <div style="grid-column:1/-1">
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">* 特殊病例名称</label>
            <select id="newCase" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
              <option value="">-- 请选择 --</option>
              <option value="单纯性肥胖（BMI≥28）">单纯性肥胖（BMI≥28）</option>
              <option value="超重合并2型糖尿病">超重合并2型糖尿病</option>
              <option value="肥胖合并2型糖尿病">肥胖合并2型糖尿病</option>
              <option value="肥胖合并高血压">肥胖合并高血压</option>
              <option value="肥胖合并高脂血症">肥胖合并高脂血症</option>
              <option value="肥胖合并多代谢综合征">肥胖合并多代谢综合征</option>
            </select>
          </div>
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">* 来源机构</label>
            <input id="newHospital" type="text" placeholder="如：仁济医院" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
          </div>
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">联系电话</label>
            <input id="newPhone" type="text" placeholder="选填" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
          </div>
          <div style="grid-column:1/-1">
            <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;">备注说明</label>
            <input id="newNote" type="text" placeholder="其他需说明的情况（选填）" style="width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:16px;margin-top:40px;">
          <button onclick="clearForm()" style="padding:10px 24px;border-radius:9999px;background:#F1F5F9;color:var(--text);border:none;cursor:pointer;">清空</button>
          <button onclick="submitApplication()" style="padding:10px 24px;border-radius:9999px;background:var(--bayer-blue);color:#fff;border:none;cursor:pointer;">提交申请</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModalDirect()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">申请详情</div>
      <button onclick="closeModalDirect()" style="font-size:28px;background:none;border:none;cursor:pointer;color:var(--muted);">×</button>
    </div>
    <div class="modal-body">
      <div id="progressTrack" style="display:flex;gap:12px;margin-bottom:32px;"></div>
      <div class="detail-grid" id="detailGrid"></div>

      <!-- 医生团队 -->
      <div style="margin-top:32px;">
        <div class="detail-label">医生团队</div>
        <div style="background:#F8FAFC;border:1px solid var(--border);border-radius:14px;padding:20px;">
          <div style="display:flex;gap:20px;align-items:center;margin-bottom:16px;">
            <div style="width:48px;height:48px;border-radius:50%;background:var(--bayer-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;">李</div>
            <div>
              <div style="font-weight:600;">李明轩 主治医师</div>
              <div style="color:var(--muted);font-size:14px;">内分泌科 · 负责医学评估</div>
              <div style="color:var(--muted);font-size:14px;">电话：138-XXXX-XXXX</div>
            </div>
          </div>
          <div style="display:flex;gap:20px;align-items:center;">
            <div style="width:48px;height:48px;border-radius:50%;background:var(--bayer-green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;">王</div>
            <div>
              <div style="font-weight:600;">王晓琪 副主任医师</div>
              <div style="color:var(--muted);font-size:14px;">临床药理科 · 负责最终审批</div>
              <div style="color:var(--muted);font-size:14px;">电话：139-XXXX-XXXX</div>
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top:28px;">
        <div class="detail-label">审核意见</div>
        <textarea id="reviewNote" rows="4" style="width:100%;padding:16px;border:1px solid var(--border);border-radius:12px;font-size:15px;resize:vertical;" placeholder="请填写审核意见（可选）…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="reviewAction('rejected')" style="padding:10px 24px;border-radius:9999px;background:var(--rejected);color:#fff;border:none;cursor:pointer;">拒绝申请</button>
      <button onclick="reviewAction('approved')" style="padding:10px 24px;border-radius:9999px;background:var(--bayer-green);color:#fff;border:none;cursor:pointer;">批准申请</button>
      <button onclick="closeModalDirect()" style="padding:10px 24px;border-radius:9999px;background:#F1F5F9;color:var(--text);border:none;cursor:pointer;">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const avatarColors = ['#10384F', '#00BCFF', '#89D329', '#FF9500', '#00617F'];

let applications = [
  { id:'APP-2026-001', name:'张明远', age:52, bmi:31.2, caseName:'肥胖合并2型糖尿病', hospital:'仁济医院（南院）', date:'2026-03-01', status:'approved', note:'', bodyFat:28.5, visceralFat:12, supplement:'' },
  { id:'APP-2026-002', name:'李雪梅', age:44, bmi:28.7, caseName:'超重合并2型糖尿病', hospital:'仁济医院（东院）', date:'2026-03-05', status:'approved', note:'' },
  { id:'APP-2026-003', name:'王建国', age:38, bmi:33.5, caseName:'肥胖合并高血压', hospital:'仁济医院（南院）', date:'2026-03-08', status:'reviewing', note:'' },
  { id:'APP-2026-004', name:'陈丽华', age:61, bmi:29.4, caseName:'肥胖合并多代谢综合征', hospital:'仁济医院（东院）', date:'2026-03-10', status:'pending', note:'', bodyFat:32.1, visceralFat:15, supplement:'需提供最近3个月肝肾功能报告' },
  { id:'APP-2026-005', name:'刘洋', age:47, bmi:35.1, caseName:'单纯性肥胖（BMI≥28）', hospital:'仁济医院（南院）', date:'2026-03-12', status:'approved', note:'' },
  { id:'APP-2026-006', name:'赵晓燕', age:55, bmi:27.8, caseName:'超重合并2型糖尿病', hospital:'仁济医院（东院）', date:'2026-03-15', status:'rejected', note:'BMI未达入组标准（<28），不符合特殊病例条件。' },
  { id:'APP-2026-007', name:'孙志伟', age:42, bmi:30.9, caseName:'肥胖合并高脂血症', hospital:'仁济医院（南院）', date:'2026-03-18', status:'pending', note:'' },
  { id:'APP-2026-008', name:'周颖', age:36, bmi:32.0, caseName:'肥胖合并2型糖尿病', hospital:'仁济医院（东院）', date:'2026-03-22', status:'pending', note:'' },
];

let currentFilter = 'all';
let currentSearch = '';
let currentAppId = null;

const statusLabel = { pending:'待审核', reviewing:'审核中', approved:'已批准', rejected:'已拒绝' };
const statusStyle = {
  pending: { bg: '#FFF3E0', color: '#F57C00' },
  reviewing: { bg: '#E3F2FD', color: '#0066CC' },
  approved: { bg: '#E8F5E9', color: '#2E7D32' },
  rejected: { bg: '#FFEBEE', color: '#C62828' }
};

function renderTable() {
  const tbody = document.getElementById('tableBody');
  let data = applications.filter(a => {
    const matchFilter = currentFilter === 'all' || a.status === currentFilter;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || a.name.includes(q) || a.id.toLowerCase().includes(q) || a.caseName.includes(q);
    return matchFilter && matchSearch;
  });

  tbody.innerHTML = data.map(a => {
    const color = avatarColors[applications.indexOf(a) % avatarColors.length];
    const initials = a.name[0];
    const actions = (a.status === 'pending' || a.status === 'reviewing')
      ? `<button class="action-btn approve" onclick="quickApprove('${a.id}',event);event.stopImmediatePropagation();">批准</button>
         <button class="action-btn reject" onclick="quickReject('${a.id}',event);event.stopImmediatePropagation();">拒绝</button>`
      : `<button class="action-btn" onclick="openModal('${a.id}',event);event.stopImmediatePropagation();" style="background:#F1F5F9;color:var(--text);">详情</button>`;

    return `<tr onclick="openModal('${a.id}',event)">
      <td><div class="applicant-cell">
        <div class="applicant-avatar" style="background:${color}">${initials}</div>
        <div><div style="font-weight:600">${a.name}</div><div style="font-size:13px;color:var(--muted);font-family:monospace">${a.id}</div></div>
      </div></td>
      <td><span style="background:#E6F4FF;color:var(--bayer-blue);padding:4px 12px;border-radius:8px;font-weight:600">${a.age}</span></td>
      <td style="font-family:monospace">${a.bmi.toFixed(1)}</td>
      <td><span style="padding:6px 16px;border-radius:9999px;background:#E6F4FF;color:var(--bayer-dark);font-size:13px">${a.caseName}</span></td>
      <td style="color:var(--muted)">${a.hospital}</td>
      <td style="font-family:monospace;color:var(--muted)">${a.date}</td>
      <td><span class="status-badge" style="background:${statusStyle[a.status].bg};color:${statusStyle[a.status].color}">${statusLabel[a.status]}</span></td>
      <td>${actions}</td>
    </tr>`;
  }).join('');

  // 更新统计
  document.getElementById('totalCount').textContent = applications.length;
  document.getElementById('pendingCount').textContent = applications.filter(a=>a.status==='pending').length;
  document.getElementById('approvedCount').textContent = applications.filter(a=>a.status==='approved').length;
  document.getElementById('rejectedCount').textContent = applications.filter(a=>a.status==='rejected').length;
  document.getElementById('pendingBadge').textContent = applications.filter(a=>a.status==='pending').length;
}

function applyFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function filterTable(q) {
  currentSearch = q;
  renderTable();
}

function openModal(id, e) {
  if(e) e.stopImmediatePropagation();
  const a = applications.find(x => x.id === id);
  if(!a) return;
  currentAppId = id;

  document.getElementById('modalTitle').textContent = `${a.name} · 申请详情`;
  document.getElementById('modalSub').textContent = `编号：${a.id}　·　提交日期：${a.date}`;

  // Progress
  const steps = ['提交申请','资料核查','医学评估','最终审批'];
  const stepIndex = {pending:0, reviewing:1, approved:3, rejected:1}[a.status];
  let progressHTML = '';
  steps.forEach((s, i) => {
    const isDone = i < stepIndex;
    const isActive = i === stepIndex;
    progressHTML += `
      <div style="flex:1;text-align:center;position:relative;">
        <div style="width:32px;height:32px;margin:0 auto;border-radius:50%;border:3px solid ${isDone ? '#89D329' : isActive ? '#00BCFF' : '#E0E7EF'};background:${isDone ? '#89D329' : isActive ? '#00BCFF' : '#fff'};color:${isDone || isActive ? '#fff' : '#5A6B7F'};display:flex;align-items:center;justify-content:center;font-weight:700;">${isDone ? '✓' : i+1}</div>
        <div style="margin-top:8px;font-size:13px;color:${isDone ? '#89D329' : isActive ? '#00BCFF' : '#5A6B7F'}">${s}</div>
      </div>`;
  });
  document.getElementById('progressTrack').innerHTML = progressHTML;

  // Detail Grid
  let gridHTML = `
    <div><div class="detail-label">申请人</div><div class="detail-value">${a.name}</div></div>
    <div><div class="detail-label">申请编号</div><div class="detail-value">${a.id}</div></div>
    <div><div class="detail-label">年龄</div><div class="detail-value">${a.age} 岁</div></div>
    <div><div class="detail-label">BMI</div><div class="detail-value">${a.bmi.toFixed(1)} kg/m²</div></div>
    <div><div class="detail-label">体脂率</div><div class="detail-value">${a.bodyFat ? a.bodyFat + ' %' : '-'}</div></div>
    <div><div class="detail-label">内脏脂肪</div><div class="detail-value">${a.visceralFat ? a.visceralFat + ' 级' : '-'}</div></div>
    <div style="grid-column:1/-1"><div class="detail-label">特殊病例名称</div><div class="detail-value">${a.caseName}</div></div>
    <div><div class="detail-label">来源机构</div><div class="detail-value">${a.hospital}</div></div>
    <div><div class="detail-label">当前状态</div><div class="detail-value" style="display:inline-block;padding:6px 18px;border-radius:9999px;background:${statusStyle[a.status].bg};color:${statusStyle[a.status].color}">${statusLabel[a.status]}</div></div>
  `;

  if (a.supplement) {
    gridHTML += `<div style="grid-column:1/-1"><div class="detail-label">需补充资料</div><div class="detail-box">${a.supplement}</div></div>`;
  }

  document.getElementById('detailGrid').innerHTML = gridHTML;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('show');
  currentAppId = null;
}

function reviewAction(status) {
  if(!currentAppId) return;
  const note = document.getElementById('reviewNote').value;
  const a = applications.find(x => x.id === currentAppId);
  a.status = status;
  a.note = note;
  closeModalDirect();
  renderTable();
  showToast(status === 'approved' ? '✅ 申请已批准' : '❌ 申请已拒绝');
}

function quickApprove(id, e) {
  if(e) e.stopImmediatePropagation();
  applications.find(x => x.id === id).status = 'approved';
  renderTable();
  showToast('✅ 已批准');
}

function quickReject(id, e) {
  if(e) e.stopImmediatePropagation();
  applications.find(x => x.id === id).status = 'rejected';
  renderTable();
  showToast('❌ 已拒绝');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('content-' + tab).classList.add('active');
}

function submitApplication() {
  const name = document.getElementById('newName').value.trim();
  const age = parseInt(document.getElementById('newAge').value);
  const bmi = parseFloat(document.getElementById('newBmi').value);
  const caseName = document.getElementById('newCase').value;
  const hospital = document.getElementById('newHospital').value.trim();

  if(!name || !age || !bmi || !caseName || !hospital) {
    showToast('⚠️ 请填写所有必填项'); return;
  }
  if(age < 18 || age > 75) { showToast('⚠️ 年龄须在18–75岁之间'); return; }
  if(bmi < 24) { showToast('⚠️ BMI须≥24 kg/m²'); return; }

  const n = applications.length + 1;
  const id = `APP-2026-${String(n).padStart(3,'0')}`;
  const today = new Date().toISOString().slice(0,10);

  applications.push({ 
    id, name, age, bmi, caseName, hospital, date: today, 
    status: 'pending', note: '', bodyFat: null, visceralFat: null, supplement: '' 
  });

  clearForm();
  switchTab('review');
  renderTable();
  showToast(`✅ 申请 ${id} 已提交`);
}

function clearForm() {
  ['newName','newAge','newBmi','newCase','newHospital','newPhone','newNote'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
window.onload = renderTable;
</script>
</body>
</html>
