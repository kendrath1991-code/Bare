<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拜耳 Retatrutide 试药申请 · 内部审核系统</title>
    <!-- Apple-like fonts -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&amp;family=SF+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --navy: #0a2540;
            --bayer-blue: #0066cc;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --border: #d2d2d7;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --card: #1c1c1e;
                --text: #f5f5f7;
                --muted: #a1a1a6;
                --border: #38383a;
                --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--navy);
            color: #fff;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
        }

        .sidebar-logo {
            padding: 36px 32px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .logo-bayer {
            font-size: 29px;
            font-weight: 700;
            letter-spacing: -1.2px;
            color: #fff;
        }

        .logo-sub {
            font-size: 11.5px;
            font-weight: 500;
            color: #8ab4f7;
            letter-spacing: 2.5px;
            margin-top: 6px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 24px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 32px;
            font-size: 15.5px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nav-item.active {
            background: var(--bayer-blue);
            color: #fff;
            font-weight: 600;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--orange);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 9999px;
            font-family: "SF Mono", monospace;
        }

        /* ── Main ── */
        .main {
            margin-left: 260px;
            min-height: 100vh;
        }

        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            height: 68px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
        }

        .topbar-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.6px;
            color: var(--text);
        }

        .topbar-search {
            background: rgba(118, 118, 128, 0.12);
            border-radius: 12px;
            padding: 8px 16px;
            width: 320px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: var(--muted);
            transition: all 0.2s;
        }

        .topbar-search:focus-within {
            background: rgba(118, 118, 128, 0.2);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.15);
        }

        .topbar-search input {
            border: none;
            background: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            color: var(--text);
        }

        /* ── Content ── */
        .content {
            padding: 48px 40px;
        }

        .tab-row {
            display: flex;
            gap: 2px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 32px;
        }

        .tab {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.25s;
        }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--bayer-blue);
            font-weight: 600;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: var(--shadow);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-6px);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 600;
            font-family: "SF Mono", monospace;
            letter-spacing: -2px;
            margin: 12px 0 6px;
        }

        .stat-delta {
            font-size: 14px;
            color: var(--muted);
        }

        .stat-delta span {
            color: var(--green);
            font-weight: 600;
        }

        /* Table */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .filter-row {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s;
        }

        .filter-btn.active {
            background: var(--bayer-blue);
            color: #fff;
            border-color: var(--bayer-blue);
        }

        .table-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: rgba(0, 0, 0, 0.02);
        }

        th {
            padding: 18px 28px;
            text-align: left;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        td {
            padding: 20px 28px;
            font-size: 15.5px;
            border-top: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover {
            background: rgba(0, 102, 204, 0.05);
        }

        .applicant-cell {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .applicant-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
            font-size: 15px;
        }

        .applicant-name {
            font-weight: 600;
        }

        .applicant-id {
            font-size: 13px;
            font-family: "SF Mono", monospace;
            color: var(--muted);
        }

        .age-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 102, 204, 0.1);
            color: var(--bayer-blue);
            font-size: 13px;
            font-weight: 600;
            width: 42px;
            height: 28px;
            border-radius: 8px;
            font-family: "SF Mono", monospace;
        }

        .case-tag {
            padding: 5px 16px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge {
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 13.5px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
        }

        .action-btn.approve {
            background: var(--green);
            color: #fff;
        }

        .action-btn.reject {
            background: #ffebee;
            color: var(--red);
        }

        /* Form */
        .form-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-select {
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg);
            transition: all 0.25s;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--bayer-blue);
            box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.15);
            outline: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: 24px;
            width: 620px;
            max-height: 92vh;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 21px;
            font-weight: 600;
        }

        .modal-body {
            padding: 32px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 28px;
        }

        .detail-label {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.8px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
        }

        .detail-value.mono {
            font-family: "SF Mono", monospace;
        }

        .modal-footer {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 16px 24px;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: var(--green); }
        .toast.warning { background: var(--red); }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-bayer">BAYER</div>
            <div class="logo-sub">RETATRUTIDE</div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" onclick="switchTab('review')">
                <span style="font-size:22px">📋</span>
                申请审核
                <span class="nav-badge" id="pendingBadge">3</span>
            </div>
            <div class="nav-item" onclick="switchTab('new')">
                <span style="font-size:22px">✚</span>
                新建申请
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-title">Retatrutide 试药申请 · 内部审核系统</div>
            <div class="topbar-search">
                <span style="font-size:20px">🔍</span>
                <input type="text" placeholder="搜索申请人、病例编号…" oninput="filterTable(this.value)">
            </div>
        </div>

        <div class="content">

            <!-- Tabs -->
            <div class="tab-row">
                <div class="tab active" id="tab-review" onclick="switchTab('review')">申请列表</div>
                <div class="tab" id="tab-new" onclick="switchTab('new')">新建申请</div>
            </div>

            <!-- Review Tab -->
            <div class="tab-content active" id="content-review">

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">申请总数</div>
                        <div class="stat-value" id="totalCount">8</div>
                        <div class="stat-delta">本月新增 <span>+3</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">待审核</div>
                        <div class="stat-value" id="pendingCount">3</div>
                        <div class="stat-delta">需优先处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">已批准</div>
                        <div class="stat-value" id="approvedCount">4</div>
                        <div class="stat-delta">批准率 <span>80%</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">已拒绝</div>
                        <div class="stat-value" id="rejectedCount">1</div>
                        <div class="stat-delta">本月 <span>1</span> 件</div>
                    </div>
                </div>

                <!-- Filter -->
                <div class="section-header">
                    <div>
                        <div class="section-title">申请列表</div>
                        <div style="font-size:14px;color:var(--muted);margin-top:4px;">Retatrutide（瑞他鲁肽）个人试药申请</div>
                    </div>
                    <div class="filter-row">
                        <div class="filter-btn active" onclick="applyFilter('all', this)">全部</div>
                        <div class="filter-btn" onclick="applyFilter('pending', this)">待审核</div>
                        <div class="filter-btn" onclick="applyFilter('reviewing', this)">审核中</div>
                        <div class="filter-btn" onclick="applyFilter('approved', this)">已批准</div>
                        <div class="filter-btn" onclick="applyFilter('rejected', this)">已拒绝</div>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>申请人</th>
                                <th>年龄</th>
                                <th>BMI</th>
                                <th>特殊病例名称</th>
                                <th>来源机构</th>
                                <th>申请日期</th>
                                <th>状态</th>
                                <th style="width:160px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- New Application Tab -->
            <div class="tab-content" id="content-new">
                <div class="form-card">
                    <div class="section-title" style="margin-bottom:28px;">新建试药申请</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">* 申请人姓名</label>
                            <input class="form-input" type="text" id="newName" placeholder="请输入真实姓名">
                        </div>
                        <div class="form-group">
                            <label class="form-label">* 申请人ID</label>
                            <input class="form-input" type="text" id="newId" placeholder="系统自动生成">
                        </div>
                        <div class="form-group">
                            <label class="form-label">* 年龄</label>
                            <input class="form-input" type="number" id="newAge" placeholder="18–75" min="18" max="75">
                        </div>
                        <div class="form-group">
                            <label class="form-label">* BMI（kg/m²）</label>
                            <input class="form-input" type="number" id="newBmi" placeholder="≥24.0" step="0.1">
                        </div>
                        <div class="form-group full">
                            <label class="form-label">* 特殊病例名称</label>
                            <select class="form-select" id="newCase">
                                <option value="">-- 请选择 --</option>
                                <option value="单纯性肥胖（BMI≥28）">单纯性肥胖（BMI≥28）</option>
                                <option value="超重合并2型糖尿病">超重合并2型糖尿病</option>
                                <option value="肥胖合并2型糖尿病">肥胖合并2型糖尿病</option>
                                <option value="肥胖合并高血压">肥胖合并高血压</option>
                                <option value="肥胖合并高脂血症">肥胖合并高脂血症</option>
                                <option value="肥胖合并多代谢综合征">肥胖合并多代谢综合征</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">* 来源机构</label>
                            <input class="form-input" type="text" id="newHospital" placeholder="如：仁济医院">
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <input class="form-input" type="text" id="newPhone" placeholder="选填">
                        </div>
                        <div class="form-group full">
                            <label class="form-label">备注说明</label>
                            <input class="form-input" type="text" id="newNote" placeholder="其他需说明的情况（选填）">
                        </div>
                    </div>
                    <div style="display:flex;justify-content:flex-end;gap:16px;margin-top:32px;">
                        <button class="action-btn" style="background:#f5f5f7;color:#1d1d1f;" onclick="clearForm()">清空</button>
                        <button class="action-btn" style="background:var(--bayer-blue);color:#fff;" onclick="submitApplication()">提交申请</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModalDirect()">
        <div class="modal" onclick="event.stopImmediatePropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="modalTitle">申请详情</div>
                    <div style="font-size:14px;color:var(--muted);margin-top:4px;" id="modalSub"></div>
                </div>
                <button onclick="closeModalDirect()" style="background:none;border:none;font-size:28px;cursor:pointer;color:var(--muted);">×</button>
            </div>
            <div class="modal-body">
                <div id="progressTrack" style="display:flex;gap:8px;margin-bottom:32px;"></div>
                <div class="detail-grid" id="detailGrid"></div>

                <div style="margin-top:24px;">
                    <div class="detail-label">审核意见</div>
                    <textarea id="reviewNote" rows="4" style="width:100%;padding:16px;border-radius:12px;border:1px solid var(--border);font-size:15px;resize:vertical;" placeholder="请填写审核意见（可选）…"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="action-btn" style="background:var(--red);color:#fff;" onclick="reviewAction('rejected')">拒绝申请</button>
                <button class="action-btn" style="background:var(--green);color:#fff;" onclick="reviewAction('approved')">批准申请</button>
                <button class="action-btn" style="background:#f5f5f7;color:#1d1d1f;" onclick="closeModalDirect()">关闭</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        const avatarColors = ['#0066cc', '#34c759', '#ff9500', '#ff3b30', '#5856d6', '#af52de', '#00c7be'];

        let applications = [
            { id: 'APP-2026-001', name: '张明远', age: 52, bmi: 31.2, caseName: '肥胖合并2型糖尿病', hospital: '仁济医院（南院）', date: '2026-03-01', status: 'approved', note: '' },
            { id: 'APP-2026-002', name: '李雪梅', age: 44, bmi: 28.7, caseName: '超重合并2型糖尿病', hospital: '仁济医院（东院）', date: '2026-03-05', status: 'approved', note: '' },
            { id: 'APP-2026-003', name: '王建国', age: 38, bmi: 33.5, caseName: '肥胖合并高血压', hospital: '仁济医院（南院）', date: '2026-03-08', status: 'reviewing', note: '' },
            { id: 'APP-2026-004', name: '陈丽华', age: 61, bmi: 29.4, caseName: '肥胖合并多代谢综合征', hospital: '仁济医院（东院）', date: '2026-03-10', status: 'pending', note: '' },
            { id: 'APP-2026-005', name: '刘洋', age: 47, bmi: 35.1, caseName: '单纯性肥胖（BMI≥28）', hospital: '仁济医院（南院）', date: '2026-03-12', status: 'approved', note: '' },
            { id: 'APP-2026-006', name: '赵晓燕', age: 55, bmi: 27.8, caseName: '超重合并2型糖尿病', hospital: '仁济医院（东院）', date: '2026-03-15', status: 'rejected', note: 'BMI未达入组标准（<28），不符合特殊病例条件。' },
            { id: 'APP-2026-007', name: '孙志伟', age: 42, bmi: 30.9, caseName: '肥胖合并高脂血症', hospital: '仁济医院（南院）', date: '2026-03-18', status: 'pending', note: '' },
            { id: 'APP-2026-008', name: '周颖', age: 36, bmi: 32.0, caseName: '肥胖合并2型糖尿病', hospital: '仁济医院（东院）', date: '2026-03-22', status: 'pending', note: '' },
        ];

        let currentFilter = 'all';
        let currentSearch = '';
        let currentAppId = null;

        const caseClass = {
            '肥胖合并2型糖尿病': '#e3f2fd',
            '超重合并2型糖尿病': '#e8f5e9',
            '单纯性肥胖（BMI≥28）': '#fff3e0',
            '肥胖合并高血压': '#f3e5f5',
            '肥胖合并高脂血症': '#f3e5f5',
            '肥胖合并多代谢综合征': '#e3f2fd',
        };

        const statusLabel = { pending: '待审核', reviewing: '审核中', approved: '已批准', rejected: '已拒绝' };
        const statusClass = {
            pending: { bg: '#fff3e0', color: '#f57c00' },
            reviewing: { bg: '#e3f2fd', color: '#1976d2' },
            approved: { bg: '#e8f5e9', color: '#388e3c' },
            rejected: { bg: '#ffebee', color: '#d32f2f' }
        };

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            let data = applications.filter(a => {
                const matchFilter = currentFilter === 'all' || a.status === currentFilter;
                const q = currentSearch.toLowerCase();
                const matchSearch = !q || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q) || a.caseName.includes(q);
                return matchFilter && matchSearch;
            });

            tbody.innerHTML = data.map(a => {
                const colorIndex = applications.indexOf(a) % avatarColors.length;
                const initials = a.name[0];
                const actions = (a.status === 'pending' || a.status === 'reviewing')
                    ? `<button class="action-btn approve" onclick="quickApprove('${a.id}', event)" style="margin-right:8px;">批准</button>
                       <button class="action-btn reject" onclick="quickReject('${a.id}', event)">拒绝</button>`
                    : `<button class="action-btn" onclick="openModal('${a.id}', event)" style="background:#f5f5f7;color:#1d1d1f;">查看详情</button>`;

                return `
                <tr onclick="openModal('${a.id}')">
                    <td>
                        <div class="applicant-cell">
                            <div class="applicant-avatar" style="background:${avatarColors[colorIndex]}">${initials}</div>
                            <div>
                                <div class="applicant-name">${a.name}</div>
                                <div class="applicant-id">${a.id}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="age-badge">${a.age}</span></td>
                    <td style="font-family:'SF Mono',monospace;font-weight:500">${a.bmi.toFixed(1)}</td>
                    <td><span class="case-tag" style="background:${caseClass[a.caseName]||'#f5f5f7'};color:#1d1d1f">${a.caseName}</span></td>
                    <td style="color:var(--muted);font-size:15px">${a.hospital}</td>
                    <td style="font-family:'SF Mono',monospace;color:var(--muted)">${a.date}</td>
                    <td>
                        <span class="status-badge" style="background:${statusClass[a.status].bg};color:${statusClass[a.status].color}">
                            ${statusLabel[a.status]}
                        </span>
                    </td>
                    <td>${actions}</td>
                </tr>`;
            }).join('');

            // 更新统计
            document.getElementById('totalCount').textContent = applications.length;
            document.getElementById('pendingCount').textContent = applications.filter(a => a.status === 'pending').length;
            document.getElementById('approvedCount').textContent = applications.filter(a => a.status === 'approved').length;
            document.getElementById('rejectedCount').textContent = applications.filter(a => a.status === 'rejected').length;
            document.getElementById('pendingBadge').textContent = applications.filter(a => a.status === 'pending').length;
        }

        function applyFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderTable();
        }

        function filterTable(q) {
            currentSearch = q;
            renderTable();
        }

        function openModal(id, e) {
            if (e) e.stopPropagation();
            const app = applications.find(x => x.id === id);
            if (!app) return;
            currentAppId = id;

            document.getElementById('modalTitle').textContent = `${app.name} · 申请详情`;
            document.getElementById('modalSub').textContent = `编号：${app.id}　·　提交日期：${app.date}`;

            // Progress bar
            const steps = ['提交申请', '资料核查', '医学评估', '最终审批'];
            const stepIndex = { pending: 0, reviewing: 1, approved: 3, rejected: 1 }[app.status];
            let progressHTML = '';
            steps.forEach((s, i) => {
                const isDone = i < stepIndex;
                const isActive = i === stepIndex;
                progressHTML += `
                <div style="flex:1;text-align:center;position:relative;">
                    <div style="width:32px;height:32px;border-radius:50%;margin:0 auto;border:3px solid ${isDone ? '#34c759' : isActive ? '#0066cc' : '#d2d2d7'};background:${isDone ? '#34c759' : isActive ? '#0066cc' : '#fff'};color:${isDone || isActive ? '#fff' : '#6e6e73'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;">${isDone ? '✓' : i + 1}</div>
                    <div style="margin-top:8px;font-size:13px;color:${isDone ? '#34c759' : isActive ? '#0066cc' : '#6e6e73'}">${s}</div>
                    ${i < steps.length - 1 ? `<div style="position:absolute;top:14px;left:60%;right:-50%;height:3px;background:${isDone ? '#34c759' : '#d2d2d7'}"></div>` : ''}
                </div>`;
            });
            document.getElementById('progressTrack').innerHTML = progressHTML;

            // Detail grid
            const color = avatarColors[applications.indexOf(app) % avatarColors.length];
            document.getElementById('detailGrid').innerHTML = `
                <div>
                    <div class="detail-label">申请人</div>
                    <div class="detail-value" style="display:flex;align-items:center;gap:12px">
                        <div style="width:36px;height:36px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600">${app.name[0]}</div>
                        ${app.name}
                    </div>
                </div>
                <div>
                    <div class="detail-label">申请编号</div>
                    <div class="detail-value mono">${app.id}</div>
                </div>
                <div>
                    <div class="detail-label">年龄</div>
                    <div class="detail-value">${app.age} 岁</div>
                </div>
                <div>
                    <div class="detail-label">BMI</div>
                    <div class="detail-value mono">${app.bmi.toFixed(1)} kg/m²</div>
                </div>
                <div style="grid-column:1/-1">
                    <div class="detail-label">特殊病例名称</div>
                    <div class="detail-value"><span class="case-tag" style="background:${caseClass[app.caseName]||'#f5f5f7'}">${app.caseName}</span></div>
                </div>
                <div>
                    <div class="detail-label">来源机构</div>
                    <div class="detail-value">${app.hospital}</div>
                </div>
                <div>
                    <div class="detail-label">当前状态</div>
                    <div class="detail-value"><span class="status-badge" style="background:${statusClass[app.status].bg};color:${statusClass[app.status].color}">${statusLabel[app.status]}</span></div>
                </div>
                ${app.note ? `
                <div style="grid-column:1/-1;margin-top:12px">
                    <div class="detail-label">历史审核意见</div>
                    <div style="background:#f8f9fa;padding:16px;border-radius:12px;font-size:15px;line-height:1.6">${app.note}</div>
                </div>` : ''}
            `;

            const canReview = app.status === 'pending' || app.status === 'reviewing';
            document.querySelectorAll('.modal-footer button').forEach((btn, i) => {
                if (i < 2) btn.style.display = canReview ? 'inline-flex' : 'none';
            });

            document.getElementById('reviewNote').value = app.note || '';
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('show');
            currentAppId = null;
        }

        function reviewAction(status) {
            if (!currentAppId) return;
            const note = document.getElementById('reviewNote').value.trim();
            const app = applications.find(x => x.id === currentAppId);
            app.status = status;
            app.note = note;
            closeModalDirect();
            renderTable();
            showToast(status === 'approved' ? '✅ 申请已批准' : '❌ 申请已拒绝', status === 'approved' ? 'success' : 'warning');
        }

        function quickApprove(id, e) {
            e.stopPropagation();
            const app = applications.find(x => x.id === id);
            app.status = 'approved';
            renderTable();
            showToast('✅ 已批准', 'success');
        }

        function quickReject(id, e) {
            e.stopPropagation();
            const app = applications.find(x => x.id === id);
            app.status = 'rejected';
            renderTable();
            showToast('❌ 已拒绝', 'warning');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('content-' + tab).classList.add('active');
        }

        function submitApplication() {
            const name = document.getElementById('newName').value.trim();
            const age = parseInt(document.getElementById('newAge').value);
            const bmi = parseFloat(document.getElementById('newBmi').value);
            const caseName = document.getElementById('newCase').value;
            const hospital = document.getElementById('newHospital').value.trim();

            if (!name || !age || !bmi || !caseName || !hospital) {
                showToast('⚠️ 请填写所有必填项', 'warning');
                return;
            }
            if (age < 18 || age > 75) {
                showToast('⚠️ 年龄须在18–75岁之间', 'warning');
                return;
            }
            if (bmi < 24) {
                showToast('⚠️ BMI须≥24 kg/m²', 'warning');
                return;
            }

            const n = applications.length + 1;
            const id = `APP-2026-${String(n).padStart(3, '0')}`;
            const today = new Date().toISOString().slice(0, 10);

            applications.push({
                id, name, age, bmi, caseName, hospital,
                date: today,
                status: 'pending',
                note: document.getElementById('newNote').value.trim()
            });

            clearForm();
            switchTab('review');
            renderTable();
            showToast(`✅ 申请 ${id} 已成功提交`, 'success');
        }

        function clearForm() {
            ['newName', 'newId', 'newAge', 'newBmi', 'newHospital', 'newPhone', 'newNote'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            document.getElementById('newCase').value = '';
        }

        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (type || '');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3200);
        }

        // 初始化
        window.onload = function () {
            renderTable();
        };
    </script>
</body>
</html>
